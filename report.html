<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แจ้งปัญหา - Pinky Closet</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background-color: #ffe6f0;
      margin: 0;
      padding: 0;
    }
    
    header{
      background-color: #ff66a3;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container{
      width: 50%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align: center;
      color: #ff3385;
    }

    label{
      display: block;
      margin-top: 10px;
    }

    textarea{
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button{
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background-color: #ff66a3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background-color: #ff3385;
    }

    .success{
      margin-top: 15px;
      text-align: center;
      color: green;
      display: none;
      font-weight: bold;
    }

    .back{
      display: block;
      text-align: center;
      margin-top: 15px;
    }

    .back a{
      color: #ff3385;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  แจ้งปัญหา - Pinky Closet
</header>

<div class="container">
  <h2>แบบฟอร์มแจ้งปัญหา</h2>

  <form>
    <label>รายละเอียดปัญหา</label>
  <textarea id="problem" rows="5" placeholder="พิมพ์ปัญหาที่พบ..."></textarea>

  <button type="button" onclick="checkForm()">
    ส่งข้อมูล
  </button>
  
  <script>
  function checkForm() {
    var text = document.getElementById("problem").value;
    if (text.trim() === "") {
      alert("กรุณากรอกข้อมูลก่อนนะคะ");
      } else {
      window.location.href = "https://6840215104-boop.github.io/pinkycloset/report2";
      }
    }
  </script>
  </form>

  <div class="back">
    <a href="https://6840215104-boop.github.io/pinkycloset/">← กลับหน้าหลัก</a>
  </div>
</div>

<script>
  function showMessage() {
    document.getElementById("successMsg").style.display = "block";
  }
</script>

</body>
</html>
